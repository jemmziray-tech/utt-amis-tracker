name: UTT AMIS Daily Tracker

on:
  schedule:
    # Runs automatically at 14:00 UTC (17:00 EAT) Monday through Friday
    - cron: "0 14 * * 1-5"
  workflow_dispatch: # Allows you to manually trigger the run from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run the Scraper
        run: python scraper.py

      - name: Commit and Push the Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/utt_amis_history.csv
          # The '|| exit 0' prevents the action from failing if the data hasn't changed since yesterday
          git commit -m "Data pipeline: Daily UTT AMIS NAV update" || exit 0
          git push
